# ─────────────────────────────────────────
#  THEME: synthwave noir
#  neon lights, deep city nights
# ─────────────────────────────────────────

font-family = JetBrainsMono Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-feature = +ss01
font-thicken = true

cursor-style = block
cursor-style-blink = true
cursor-color = #00d4ff
cursor-opacity = 0.9

background = #0b0d1a
foreground = #e0e0f0

palette = 0=#1a1c2e
palette = 8=#2d3050
palette = 1=#ff4b82
palette = 9=#ff6b9e
palette = 2=#00e5a0
palette = 10=#00ffb3
palette = 3=#ffcc00
palette = 11=#ffe033
palette = 4=#5b8fff
palette = 12=#7aa3ff
palette = 5=#c77dff
palette = 13=#d899ff
palette = 6=#00d4ff
palette = 14=#33ddff
palette = 7=#c8c8d8
palette = 15=#ffffff

selection-background = #2d3050
selection-foreground = #ffffff

background-opacity = 0.88
background-blur = 20

window-padding-x = 16
window-padding-y = 12
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.2
scrollback-limit = 10000000
unfocused-split-opacity = 0.7
alpha-blending = linear-corrected
