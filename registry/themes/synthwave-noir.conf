# ─────────────────────────────────────────
#  THEME: synthwave noir
#  neon lights, deep city nights
# ─────────────────────────────────────────

font-family = JetBrainsMono Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-feature = +ss01
font-thicken = true

cursor-style = block
cursor-style-blink = true
cursor-color = #ff006e
cursor-opacity = 1.0

background = #0d0010
foreground = #f0e8ff

# black → deep purple shadow
palette = 0=#1a0030
palette = 8=#3d1a6e
# red → hot pink neon
palette = 1=#ff006e
palette = 9=#ff4db3
# green → neon green
palette = 2=#00ff9f
palette = 10=#69ffca
# yellow → electric yellow
palette = 3=#ffcc00
palette = 11=#ffe033
# blue → electric blue
palette = 4=#3d5afe
palette = 12=#7986cb
# magenta → electric purple
palette = 5=#d500f9
palette = 13=#e040fb
# cyan → neon cyan
palette = 6=#00e5ff
palette = 14=#40ffff
# white → lavender white (fixed)
palette = 7=#c8b8e8
palette = 15=#ffffff

selection-background = #3d1a6e
selection-foreground = #ffffff

background-opacity = 0.90
background-blur = 25

window-padding-x = 16
window-padding-y = 12
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.1
scrollback-limit = 10000000
unfocused-split-opacity = 0.7
alpha-blending = linear-corrected
