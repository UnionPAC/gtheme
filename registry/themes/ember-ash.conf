# ─────────────────────────────────────────
#  THEME: ember & ash
#  forge heat, smoldering coal, iron will
# ─────────────────────────────────────────

font-family = FiraCode Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-feature = +ss03
font-thicken = true

cursor-style = bar
cursor-style-blink = true
cursor-color = #ff7700
cursor-opacity = 1.0

background = #100a04
foreground = #f2e2c8

# black → deep charcoal
palette = 0=#201408
palette = 8=#3a2818
# red → fire red
palette = 1=#e83030
palette = 9=#ff5555
# green → moss (only living thing near the forge)
palette = 2=#7ab040
palette = 10=#a0d060
# yellow → molten amber
palette = 3=#ffaa00
palette = 11=#ffc840
# blue → cooling steel
palette = 4=#5080a0
palette = 12=#70a0c0
# magenta → ember core deep orange-red
palette = 5=#ff4010
palette = 13=#ff6040
# cyan → hot iron glow golden amber
palette = 6=#e89020
palette = 14=#ffb840
# white → warm parchment (fixed — clearly visible and warm)
palette = 7=#d8c8a8
palette = 15=#fff5e8

selection-background = #3a2818
selection-foreground = #fff5e8

background-opacity = 0.87
background-blur = 12

window-padding-x = 14
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.3
scrollback-limit = 10000000
unfocused-split-opacity = 0.72
alpha-blending = linear-corrected
