# ─────────────────────────────────────────
#  THEME: ocean depths
#  bioluminescent abyss, deep water calm
# ─────────────────────────────────────────

font-family = CaskaydiaCove Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-thicken = false

cursor-style = block
cursor-style-blink = true
cursor-color = #00f5cc
cursor-opacity = 1.0

background = #060c14
foreground = #c0dde8

palette = 0=#0f1c2e
palette = 8=#1e3550
palette = 1=#ff6b6b
palette = 9=#ff8e8e
palette = 2=#00d4aa
palette = 10=#00f0c0
palette = 3=#f0c040
palette = 11=#f5d060
palette = 4=#4da6ff
palette = 12=#6ab8ff
palette = 5=#9b6bd6
palette = 13=#b388ff
palette = 6=#00e5d4
palette = 14=#33edd8
palette = 7=#c8dde8
palette = 15=#e8f4f8

selection-background = #1e3550
selection-foreground = #e8f4f8

background-opacity = 0.90
background-blur = 30

window-padding-x = 20
window-padding-y = 14
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.1
scrollback-limit = 10000000
unfocused-split-opacity = 0.65
alpha-blending = linear-corrected
