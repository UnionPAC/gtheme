# ─────────────────────────────────────────
#  THEME: ocean depths
#  bioluminescent abyss, deep water calm
# ─────────────────────────────────────────

font-family = CaskaydiaCove Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-thicken = false

cursor-style = block
cursor-style-blink = true
cursor-color = #00ffee
cursor-opacity = 1.0

background = #020810
foreground = #a8c8d8

# black → abyss
palette = 0=#010510
palette = 8=#0a2540
# red → deep sea creature red (muted, cold)
palette = 1=#c85a7a
palette = 9=#e87a9a
# green → bioluminescent teal-green
palette = 2=#00c4a0
palette = 10=#00ffcc
# yellow → pale ice blue (no warmth in the deep)
palette = 3=#6ab0cc
palette = 11=#a8dcf0
# blue → deep water blue
palette = 4=#1a6ea8
palette = 12=#4a9fd4
# magenta → deep sea violet
palette = 5=#6a4c93
palette = 13=#9a6cd4
# cyan → bioluminescent glow (the signature)
palette = 6=#00e8d4
palette = 14=#00ffee
# white → cold blue-grey (fixed — clearly visible, distinctly cold)
palette = 7=#8ab8cc
palette = 15=#d4ecf8

selection-background = #0a2540
selection-foreground = #d4ecf8

background-opacity = 0.92
background-blur = 35

window-padding-x = 20
window-padding-y = 14
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.1
scrollback-limit = 10000000
unfocused-split-opacity = 0.65
alpha-blending = linear-corrected
