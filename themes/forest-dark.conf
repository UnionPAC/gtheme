# ─────────────────────────────────────────
#  THEME: forest dark
#  old growth canopy, moss & rain, silence
# ─────────────────────────────────────────

font-family = Hack Nerd Font
font-size = 14
font-feature = +calt
font-thicken = false

cursor-style = underline
cursor-style-blink = true
cursor-color = #00ff41
cursor-opacity = 1.0

background = #050c05
foreground = #b8e8a0

# black → forest floor shadow
palette = 0=#0a1a0a
palette = 8=#1a3a1a
# red → mushroom/berry red
palette = 1=#c84040
palette = 9=#e85555
# green → vibrant forest (the hero color)
palette = 2=#2ecc71
palette = 10=#55e888
# yellow → lichen moss yellow-green
palette = 3=#a8b840
palette = 11=#c8d840
# blue → mountain stream
palette = 4=#2980b9
palette = 12=#5aaccc
# magenta → bark brown
palette = 5=#7d5a3c
palette = 13=#a07850
# cyan → forest teal stream
palette = 6=#1abc9c
palette = 14=#00e5a0
# white → pale leaf green (fixed AND distinctive)
palette = 7=#a0cc88
palette = 15=#c8f0a8

selection-background = #1a3a1a
selection-foreground = #c8f0a8

background-opacity = 0.91
background-blur = 20

window-padding-x = 18
window-padding-y = 13
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.2
scrollback-limit = 10000000
unfocused-split-opacity = 0.68
alpha-blending = linear-corrected
