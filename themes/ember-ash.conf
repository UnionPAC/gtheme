# ─────────────────────────────────────────
#  THEME: ember & ash
#  forge heat, smoldering coal, iron will
# ─────────────────────────────────────────

font-family = FiraCode Nerd Font
font-size = 13.5
font-feature = +calt
font-feature = +liga
font-feature = +ss03
font-thicken = true

cursor-style = bar
cursor-style-blink = true
cursor-color = #ff7700
cursor-opacity = 1.0

background = #0f0a06
foreground = #f0e0c8

palette = 0=#1e1508
palette = 8=#332a18
palette = 1=#e84040
palette = 9=#ff5555
palette = 2=#8bc34a
palette = 10=#a5d663
palette = 3=#ffc107
palette = 11=#ffd54f
palette = 4=#607d8b
palette = 12=#78909c
palette = 5=#ff5722
palette = 13=#ff7043
palette = 6=#ffab40
palette = 14=#ffcc80
palette = 7=#d0c8b8
palette = 15=#f0e8d8

selection-background = #332a18
selection-foreground = #f0e8d8

background-opacity = 0.87
background-blur = 15

window-padding-x = 14
window-padding-y = 10
window-padding-balance = true
window-padding-color = extend
window-decoration = auto
window-theme = dark
window-colorspace = display-p3

mouse-hide-while-typing = true
minimum-contrast = 1.3
scrollback-limit = 10000000
unfocused-split-opacity = 0.72
alpha-blending = linear-corrected
