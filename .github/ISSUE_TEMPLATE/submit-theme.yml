name: Submit a Theme
description: Share your Ghostty theme with the gtheme community
title: "[Theme] "
labels: ["theme-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a theme! Fill out the form below and we'll add it to the registry.

        Your `.conf` file should contain valid [Ghostty config options](https://ghostty.org/docs/config/reference).

  - type: input
    id: name
    attributes:
      label: Theme name
      description: Lowercase, hyphens only (e.g. my-cool-theme)
      placeholder: my-cool-theme
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: Description
      description: One sentence — describe the vibe
      placeholder: Deep blues and electric cyan on near-black.
    validations:
      required: true

  - type: input
    id: font
    attributes:
      label: Font family
      description: The font-family value used in your theme (Nerd Font recommended)
      placeholder: JetBrainsMono Nerd Font
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Preview colors

        The next fields are **separate from your `.conf` file** — they're used purely to power the live terminal preview and color swatches on the marketplace website. They won't affect how your theme works in Ghostty.

        Pick the hex colors from your `.conf` that best represent each role. For example, your `cursor-color` is a good prompt color, your `palette = 4` (blue) is usually a good directory color, etc.

  - type: input
    id: color_background
    attributes:
      label: Background color
      description: Your theme's `background` value
      placeholder: "#0b0d1a"
    validations:
      required: true

  - type: input
    id: color_foreground
    attributes:
      label: Foreground color
      description: Your theme's `foreground` value — the main text color
      placeholder: "#e0e0f0"
    validations:
      required: true

  - type: input
    id: color_prompt
    attributes:
      label: Prompt color
      description: Color of the shell prompt — usually your `cursor-color` or a bright accent
      placeholder: "#00d4ff"
    validations:
      required: true

  - type: input
    id: color_directory
    attributes:
      label: Directory color
      description: Color used for directories — usually `palette = 4` (blue) or similar
      placeholder: "#5b8fff"
    validations:
      required: true

  - type: input
    id: color_success
    attributes:
      label: Success color
      description: Color for success or positive output — usually `palette = 2` (green)
      placeholder: "#00e5a0"
    validations:
      required: true

  - type: input
    id: color_error
    attributes:
      label: Error color
      description: Color for errors — usually `palette = 1` (red)
      placeholder: "#ff4b82"
    validations:
      required: true

  - type: dropdown
    id: tags
    attributes:
      label: Tags
      multiple: true
      options:
        - dark
        - light
        - neon
        - minimal
        - warm
        - cool
        - nature
        - retro
        - monochrome
        - pastel
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Theme config (.conf)
      description: Paste your full Ghostty config here
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: My theme name is unique (not already in the registry)
          required: true
        - label: I've tested this config in Ghostty
          required: true
        - label: I'm okay with this theme being shared publicly under the MIT license
          required: true
